name: scrape-sync-nacional-catalog

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape-sync-nacional-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run Nacional catalog sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_MAX_CONNECTIONS: ${{ secrets.POSTGRES_MAX_CONNECTIONS }}
          SKIP_SCHEMA_ENSURE: "true"
          SIRENA_PRODUCT_API_URL_TEMPLATE: ${{ secrets.SIRENA_PRODUCT_API_URL_TEMPLATE }}
          SIRENA_PRODUCTS_SEARCH_API_URL: ${{ secrets.SIRENA_PRODUCTS_SEARCH_API_URL }}
          SIRENA_CATEGORY_TREE_API_URL_TEMPLATE: ${{ secrets.SIRENA_CATEGORY_TREE_API_URL_TEMPLATE }}
          NACIONAL_REST_API_URL: ${{ secrets.NACIONAL_REST_API_URL }}
          PLAZA_LAMA_GRAPHQL_URL: ${{ secrets.PLAZA_LAMA_GRAPHQL_URL }}
          PRICESMART_PRODUCT_API_URL: ${{ secrets.PRICESMART_PRODUCT_API_URL }}
          PRICESMART_DISCOVERY_API_URL: ${{ secrets.PRICESMART_DISCOVERY_API_URL }}
        run: |
          pnpm scrape:sync-nacional-catalog \
            --limit 200 \
            --retry-hours 24 \
            --delay-min 300 \
            --delay-max 800 \
            --timeout 15000 \
            --retries 3 \
            --rest-batch-size 25
