name: scrape-broken-images-batch

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape-broken-images-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chrome for Puppeteer
        run: pnpm exec puppeteer browsers install chrome

      - name: Run broken images batch scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_MAX_CONNECTIONS: ${{ secrets.POSTGRES_MAX_CONNECTIONS }}
          REVALIDATE_BASE_URL: ${{ secrets.REVALIDATE_BASE_URL }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
        run: |
          pnpm scrape:broken-images-batch \
            --iterations 40 \
            --products-per-iteration 5 \
            --concurrency 2 \
            --delay-min 600 \
            --delay-max 1200 \
            --timeout 12000 \
            --retries 3
