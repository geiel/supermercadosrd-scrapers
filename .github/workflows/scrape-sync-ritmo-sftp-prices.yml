name: scrape-sync-ritmo-sftp-prices

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape-sync-ritmo-sftp-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run Ritmo SFTP price sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_MAX_CONNECTIONS: ${{ secrets.POSTGRES_MAX_CONNECTIONS }}
          REVALIDATE_BASE_URL: ${{ secrets.REVALIDATE_BASE_URL }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          SFPT_PASSWORD: ${{ secrets.SFPT_PASSWORD }}
          RITMO_SFTP_HOST: ${{ secrets.RITMO_SFTP_HOST }}
          RITMO_SFTP_PORT: ${{ secrets.RITMO_SFTP_PORT }}
          RITMO_SFTP_USERNAME: ${{ secrets.RITMO_SFTP_USERNAME }}
          RITMO_SFTP_DIR: ${{ secrets.RITMO_SFTP_DIR }}
          RITMO_SHOP_ID: ${{ secrets.RITMO_SHOP_ID }}
        run: pnpm scrape:sync-ritmo-sftp-prices
