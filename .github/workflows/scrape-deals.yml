name: scrape-deals

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chrome for Puppeteer
        run: pnpm exec puppeteer browsers install chrome

      - name: Run deals scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_MAX_CONNECTIONS: ${{ secrets.POSTGRES_MAX_CONNECTIONS }}
          REVALIDATE_BASE_URL: ${{ secrets.REVALIDATE_BASE_URL }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          MERCA_JUMBO_API_URL: ${{ secrets.MERCA_JUMBO_API_URL }}
          MERCA_JUMBO_STORE_CODE: ${{ secrets.MERCA_JUMBO_STORE_CODE }}
        run: |
          pnpm scrape:deals \
            --delay-min 600 \
            --delay-max 1200
